<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/menu.css">
</head>

<body>
    <div class="navigation">
        <button class="hamburger" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="nav-links">
            <a href="../pages/home.html">Home</a>
            <a href="../pages/login.html">Login</a>
            <a href="../pages/sign-up.html">Sign up</a>
            <a href="../pages/participants.html">Participants</a>
            <a href="../pages/menu.html">Menu</a>
        </nav>
    </div>
    <h2>🍽️ Our Food Menu</h2>

    <div class="menu">
        <div class="card">
            <img src="../IMAGES/chips.jpeg" alt="French Fries">
            <h3>French Fries</h3>
            <p>Crispy golden fries served hot.</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="../IMAGES/whole-chicken.jpeg" alt="Whole Chicken">
            <h3>Whole Chicken</h3>
            <p>Juicy roasted whole chicken.</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="../IMAGES/burger.jpeg" alt="Burger">
            <h3>Burger</h3>
            <p>Beef burger with fresh toppings.</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="../IMAGES/spaghetti.jpeg" alt="Pasta">
            <h3>Pasta</h3>
            <p>Creamy pasta with rich sauce.</p>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="../IMAGES/omlet.jpeg" alt="Omelet">
            <h3>Omelet</h3>
            <p>Fluffy omelet with vegetables.</p>
            <button>Order Now</button>
        </div>
    </div>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
    </script>

</body>

</html>
